{%
	set pageInfo = {
		section: 'join',
		title: '회원가입'
	}
%}
{% extends site + '/@inc/layout.html' %}

{% block content -%}
<!-- Content // -->
<div id="content-main" class="common-container section-member member-join-complete">
	<h2 class="hide">회원가입</h2>

	<div class="status-info">
		<h3 class="title">회원가입 완료</h3>
		<div class="icon"></div>
		<p class="desc">
			<span class="str">
				<span class="primary">
					홍길동
				</span>
			님
			</span>
			의
			<span class="str">회원가입을 축하</span>합니다.<br>
			스키니랩에서 제공하는 다양한 상품을 둘러보세요!
		</p>
	</div>

	<!-- 추천 상품 영역 -->
	<div class="recommend-product">
		<div class="head">
			<h3 class="title">추천상품</h3>
		</div>
		<div class="action">
			<p class="pagination"></p>
			<div class="play">
				<button type="button" class="btn-prev swiper-button-prev"></button>
				<button type="button" class="btn-autoplay swiper-button-autoplay"></button>
				<button type="button" class="btn-next swiper-button-next"></button>
			</div>
		</div>
		<div class="swiper-container">
			<ul class="goods-list2 swiper-wrapper">
				{% for i in range(0, 10) %}
				<li class="swiper-slide">
					<div class="item">
						<a href="#">
							<figure class="wrap">
								<div class="img">
									<img src="{{base}}/img/pc/@dummy/recome-goods-img01.jpg" alt="스키니랩 래피드x시네트롤 스키버닝패키지 스키니랩">
								</div>
								<figcaption class="content">
									<p class="info">
										<span class="tag primary">신제품</span>
										<span class="tag secondary">베스트</span>
										<span class="tag white">사은품</span>
									</p>
									<p class="title">
										<span class="main">
											가벼워지는 시서스다이어트 14포 X 4박스 + 석류 콜라겐 14포 x 2박스 상품명 최대 3줄 노출 이후 대 3줄 노출 이후
										</span>
										<span class="sub">
											#2021신제품 #다이어트 #활활태울
											#용기가필요한 순간
										</span>
									</p>
									<p class="price non">
										<span class="tit">비회원가</span>
										<span class="con">
											<span class="num">
												321,000
											</span>
											<span class="won">원</span>
										</span>
									</p>
									<p class="price">
										<span class="tit">회원가</span>
										<span class="con">
											<span class="rate">
												<span class="hide">할인율</span>
												37%
											</span>
											<span class="num">
												128,600
											</span>
											<span class="won">원</span>
										</span>
									</p>
								</figcaption>
							</figure>
						</a>
					</div>
				</li>
				{% endfor %}
			</ul>
		</div>
	</div>
	<!--// 추천 상품 영역 -->
</div>
<!-- // Content -->
<script>
	$(function() {
		// 추천상품 슬라이드
		var recomCarouselSwiper = new Swiper('.recommend-product .swiper-container', {
			autoplay: {
				delay: 3000
			},
			speed: 1000,
			loop: true,
			slidesPerView: 3,
			slidesPerGroup: 3 ,
			initialSlide: 0,
			spaceBetween: 90,
			allowTouchMove: false,
			pagination: {
				el: '.recommend-product .pagination',
				type: 'fraction',
				formatFractionCurrent: function(number) {
					return number < 10 ? '0' + number : number;
				},
				formatFractionTotal: function(number) {
					return number < 10 ? '0' + number : number;
				}
			},
			navigation: {
				nextEl: '.recommend-product .swiper-button-next',
				prevEl: '.recommend-product .swiper-button-prev',
			}
		});

		$('.recommend-product .btn-autoplay').on('click', function() {
			var $this = $(this);

			if($this.hasClass('is-stop')) {
				recomCarouselSwiper.autoplay.start();
			} else {
				recomCarouselSwiper.autoplay.stop();
			}

			$this.toggleClass('is-stop');
		})
	});
</script>
{%- endblock %}
