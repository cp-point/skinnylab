{%
	set pageInfo = {
		section: 'login',
		title: '비밀번호 찾기 &lt; 로그인'
	}
%}
{% extends site + '/@inc/layout.html' %}

{% block content -%}
<!-- Content // -->
<div id="content-main" class="common-container section-member member-find-pw">
	<div class="member-layout">
		<h2 class="hide">로그인</h2>

		<div class="head">
			<h3 class="title">비밀번호 찾기</h3>
			<p class="desc">회원가입 시 등록된 회원정보로<br><strong>비밀번호를 찾으실 수</strong> 있습니다.</p>
		</div>

		<div class="body">
			<div class="tab-menu2">
				<div class="wrap">
					<ul class="list">
						<li>
							<a href="javascript:void(0);">이메일</a>
						</li>
						<li>
							<a href="javascript:void(0);">휴대폰 번호</a>
						</li>
					</ul>
					<div class="list-content-wrap">
						<!-- 이메일 탭 -->
						<dlv class="list-content lc01">
							<div class="form-layout vertical">
								<dl class="row">
									<dt class="title">
										<label for="userName01">이름</label>
									</dt>
									<dd class="content">
										<span class="input-text-del">
												<!-- [ 공통 ] input class="is-invalid" 추가 시, 선 색상 변경 -->
											<input type="text" id="userName01" name="userName01" placeholder="이름 입력" class="text block underline" maxlength="10">
										</span>
										<!-- 오류 메세지 -->
										<!-- <p class="error-msg is-invalid">이름을 입력해주세요.</p> -->
									</dd>
								</dl>
								<dl class="row">
									<dt class="title">
										<label for="userId">아이디(이메일)</label>
									</dt>
									<dd class="content">
										<span class="input-certification-send input-small">
											<input type="text" id="userId" name="userId" value="" placeholder="아이디(이메일) 입력" class="text block underline" maxlength="20">
											<!-- 버튼 비활성화 : class="disabled" 추가 -->
											<button type="button" class="btn outline thin primary">인증번호발송</button>
										</span>
										<!-- 오류 메세지 -->
										<!-- <p class="error-msg is-invalid">이메일 주소를 입력해주세요.</p> -->
									</dd>
								</dl>
								<dl class="row">
									<dt class="title">
										<label for="userPhoneCertify01">인증번호</label>
									</dt>
									<dd class="content">
										<span class="input-certify">
												<!-- input 비활성화 : disabled -->
											<input type="text" id="userPhoneCertify01" name="userPhoneCertify01" value="" placeholder="인증번호 입력" class="text block underline" maxlength="20">
											<span class="timer">5:00</span>
										</span>
										<!-- 오류 메세지 -->
										<!-- <p class="error-msg is-invalid">인증번호를 입력해주세요.</p> -->
									</dd>
								</dl>
								<!-- 버튼 비활성화 : class="disabled" 추가 -->
								<a href="#" class="btn primary large long motion mgt30">
									<span>비밀번호 찾기</span>
								</a>
							</div>
						</dlv>
						<!-- // 이메일 탭 -->
						<!-- 휴대폰 번호 탭 -->
						<dlv class="list-content lc02">
							<div class="form-layout vertical">
								<dl class="row">
									<dt class="title">
										<label for="userName02">이름</label>
									</dt>
									<dd class="content">
										<span class="input-text-del">
											<input type="text" id="userName02" name="userName02" placeholder="이름 입력" class="text block underline" maxlength="10">
										</span>
										<!-- 오류 메세지 -->
										<!-- <p class="error-msg is-invalid">이름을 입력해주세요.</p> -->
									</dd>
								</dl>
								<dl class="row">
									<dt class="title">
										<label for="userPhone">휴대폰 번호</label>
									</dt>
									<dd class="content">
										<span class="input-certification-send input-small">
											<input type="tel" id="userPhone" name="userPhone" value="" placeholder="휴대폰 번호 입력" class="text block underline" maxlength="11">
											<button type="button" class="btn outline thin primary">인증번호발송</button>
										</span>
										<!-- 오류 메세지 -->
										<!-- <p class="error-msg is-invalid">휴대폰 번호를 입력해주세요.</p> -->
									</dd>
								</dl>
								<dl class="row">
									<dt class="title">
										<label for="userPhoneCertify02">인증번호</label>
									</dt>
									<dd class="content">
										<span class="input-certify">
											<input type="text" id="userPhoneCertify02" name="userPhoneCertify02" value="" placeholder="인증번호 입력" class="text block underline" maxlength="20">
											<span class="timer">5:00</span>
										</span>
										<!-- 오류 메세지 -->
										<!-- <p class="error-msg is-invalid">인증번호를 입력해주세요.</p> -->
									</dd>
								</dl>
								<a href="#" class="btn primary large long motion mgt30">
									<span>비밀번호 찾기</span>
								</a>
							</div>
						</dlv>
						<!-- // 휴대폰 번호 탭 -->
					</div>
				</div>
			</div>

		
		</div>
	</div>
</div>
<!-- // Content -->

<script>
	$('.tab-menu2 .list li').click(function(){
		var index = $(this).index()

		$('.tab-menu2 .list li').removeClass('selected')
		$(this).addClass('selected')

		$('.tab-menu2 .list-content-wrap .list-content').hide()
		$('.tab-menu2 .list-content-wrap .list-content').eq(index).show()
	})
	$('.tab-menu2 .list li').eq(0).trigger('click')
</script>
{%- endblock %}
