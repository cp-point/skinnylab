{%
	set pageInfo = {
		section: 'login',
		title: '기존 아이디 찾기 &lt; 로그인'
	}
%}
{% extends site + '/@inc/layout.html' %}

{% block content -%}
<!-- Content // -->
<div id="content-main" class="common-container section-member member-find-existing-id">
	<div class="member-layout">
		<h2 class="hide">로그인</h2>

		<div class="head">
			<h3 class="title">기존 아이디 찾기</h3>
			<p class="desc">스키니랩이<br><strong>헬스밸런스 통합 멤버십으로 변경</strong>되어<br>정보를 입력 후 아이디를 찾아주세요!</p>
		</div>

		<div class="body">
			<div class="form-layout vertical">
				<dl class="row">
					<dt class="title">
						<label for="userId">아이디(이메일)</label>
					</dt>
					<dd class="content">
						<span class="input-text-del">
							<!-- [ 공통 ] input class="is-invalid" 추가 시, 선 색상 변경 -->
							<input type="text" id="userId" name="userId" placeholder="아이디(이메일) 입력" class="text block underline">
						</span>
						<!-- 오류 메세지 -->
						<!-- <p class="error-msg is-invalid">아이디를 입력해주세요.</p> -->
					</dd>
				</dl>
				<dl class="row">
					<dt class="title">
						<label for="userName">이름</label>
					</dt>
					<dd class="content">
						<span class="input-text-del">
							<input type="text" id="userName" name="userName" placeholder="이름 입력" class="text block underline">
						</span>
						<!-- 오류 메세지 -->
						<!-- <p class="error-msg is-invalid">이름을 입력해주세요.</p> -->
					</dd>
				</dl>
				<a href="#" class="btn primary large long motion mgt30">
					<span>기존 아이디 찾기</span>
				</a>
			</div>
		</div>
	</div>
</div>
<!-- // Content -->
{%- endblock %}
