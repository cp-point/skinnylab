{%
	set pageInfo = {
		section: 'login',
		title: '아이디 찾기 &lt; 로그인'
	}
%}
{% extends site + '/@inc/layout.html' %}

{% block content -%}
<!-- Content // -->
<div id="content-main" class="common-container section-member member-find-id-complete">
	<div class="member-layout">
		<h2 class="hide">로그인</h2>

		<div class="head">
			<h3 class="title">아이디 찾기</h3>
			<p class="desc"><strong class="find-name">스**랩</strong> 님의 아이디는<br><strong class="find-id">sk******************************************************************************************b@abc.com</strong></p>
		</div>

		<div class="body">
			<div class="form-layout vertical">
				<dl class="row">
					<dt class="title">
						<label for="userId">아이디(이메일)</label>
					</dt>
					<dd class="content">
						<span class="input-text-del">
							<!-- [ 공통 ] input class="is-invalid" 추가 시, 선 색상 변경 -->
							<input type="text" id="userId" name="userId" placeholder="아이디(이메일) 입력" class="text block underline" maxlength="20">
						</span>
						<!-- 오류 메세지 -->
						<!-- <p class="error-msg is-invalid">아이디를 입력해주세요.</p> -->
					</dd>
				</dl>
				<dl class="row">
					<dt class="title">
						<label for="userPw">비밀번호</label>
					</dt>
					<dd class="content">
						<span class="input-text-del">
							<input type="password" id="userPw" name="userPw" value="" placeholder="비밀번호 입력" class="text block underline" maxlength="16">
						</span>
						<!-- 오류 메세지 -->
						<!-- <p class="error-msg is-invalid">비밀번호를 입력해주세요.</p> -->
					</dd>
				</dl>
				<div class="btn-wrap">
					<a href="./find-pw.html" class="btn outline large primary motion">
						<span>비밀번호 찾기</span>
					</a>
					<a href="#" class="btn large primary motion">
						<span>로그인</span>
					</a>
				</div>
			</div>
		</div>
	</div>
</div>
<!-- // Content -->
{%- endblock %}
