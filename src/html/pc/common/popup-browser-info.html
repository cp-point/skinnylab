{% extends site + '/@inc/layout-empty.html' %}

{% block content -%}
<!-- 브라우저 안내 // -->
<article id="popup-browser-info" class="common-popup hidden-title">
	<div class="common-popup-inner popup-browser-info">
		<div class="header">
			<h1 class="title">브라우저 안내</h1>
			<button type="button" class="btn-close js-pop-close"><span>닫기</span></button>
		</div>
		<div class="container">
			<div class="browser-info-wrap">
				<div class="main">
					비표준 브라우저(인터넷 익스플로러)가 아닌<br>
					표준 브라우저(크롬, 엣지, 파이어폭스 등)<br>
					이용을 권장드립니다.
				</div>
				<div class="btn-group center">
					<div class="item chrome">
						<a href="https://www.google.co.kr/intl/ko/chrome/" title="새창열림" target="_blank" class="btn outline thin primary">다운로드</a>
					</div>
					<div class="item edge">
						<a href="https://www.microsoft.com/ko-kr/edge" title="새창열림" target="_blank" class="btn outline thin primary">다운로드</a>
					</div>
					<div class="item firefox">
						<a href="https://www.mozilla.org/ko/firefox/new/" title="새창열림" target="_blank" class="btn outline thin primary">다운로드</a>
					</div>
				</div>
			</div>
		</div>
	</div>
</article>
<!-- // 브라우저 안내 -->
{%- endblock %}
