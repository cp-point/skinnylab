{% extends site + '/@inc/layout-empty.html' %}

{% block content -%}
<!-- 옵션클래스: full, full-scroll, hidden-title -->
<article id="popup-member-find" class="common-popup" data-motion-in="400" data-motion-out="200">
	<div class="common-popup-inner popup-member-find">
		<div class="header">
			<h1 class="title">신규 비밀번호 설정 </h1>
			<button type="button" class="btn-close js-pop-close"><span>닫기</span></button>
		</div>
		<div class="container">
			<div class="head">
				<div class="page-top-desc">
					<div class="com-txt">
						<strong>새로운 비밀번호</strong>를 <strong>설정</strong>해주세요.
					</div>
				</div>
			</div>
			<div class="body">
				<div class="form-layout large">
					<dl class="row">
						<dt class="title">
							<label for="userId1">아이디(이메일)</label>
						</dt>
						<dd class="content">
							<span class="input-text-del"> 
								<input type="text" id="userId1" name="userId1" value="sk******b@abc.com"  class="text large block underline" readonly>
							</span>
						</dd>
					</dl>
					<dl class="row">
						<dt class="title">
							<label for="userPw1">신규 비밀번호</label>
						</dt>
						<dd class="content">
							<span class="input-text-del"> 
								<input type="password" id="userPw1" name="userPw1" placeholder="신규 비밀번호 입력" class="text large block underline"> <!-- 입력오류일때: .is-invalid -->
							</span>
							<p class="error-msg is-invalid" style="display: none;">신규 비밀번호를 입력해주세요.</p> <!-- 입력오류일때 오류 문구 노출 -->
						</dd>
					</dl>
					<dl class="row">
						<dt class="title">
							<label for="userPwConfirm">신규 비밀번호 확인</label>
						</dt>
						<dd class="content">
							<span class="input-text-del"> 
								<input type="password" id="userPwConfirm" name="userPwConfirm" placeholder="신규 비밀번호 확인" class="text large block underline"> <!-- 입력오류일때: .is-invalid -->
							</span>
							<p class="error-msg is-invalid" style="display: none;">신규 비밀번호를 입력해 주세요.</p> <!-- 입력오류일때 오류 문구 노출 -->
						</dd>
					</dl>
				</div>		
			</div>
			<div class="foot">
				<div class="btn-group">
					<button type="button" class="btn large primary block">비밀번호 변경하기</button>
				</div>
				<div class="caution com-txt5">
					영문 / 숫자 / 특수문자 조합으로 최소 8자리 이상 입력<br>
					아이디와 3자리 이상 동일하거나, 3자리 이상 반복 문자와<br>
					숫자는 사용 불가합니다.
				</div>
			</div>
		</div>
	</div>
</article>
{%- endblock %}
