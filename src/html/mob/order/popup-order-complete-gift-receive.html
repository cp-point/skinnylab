{% extends site + '/@inc/layout-empty.html' %}

{% block content -%}
<!-- 옵션클래스: full, full-scroll, hidden-title -->
<article id="popup-order-gift" class="common-popup">
	<div class="common-popup-inner popup-order-complete">
		<div class="header">
			<h1 class="title">선물 받기 완료</h1>
			<button type="button" class="btn-close js-pop-close"><span>닫기</span></button>
		</div>
		<div class="container">
			<div class="body">
				<div class="result-txt is-gift">
					<p class="noti-msg">
						<span class="underline">
							홍길동님
						</span>
						이 선물하신<br>
						상품 받기가 완료되었습니다!
					</p>
					<p class="com-txt4">입력하신 배송지로 선물이 배송됩니다.</p>
					<div class="paper-confetti">
						<div class="confetti"></div>
						<div class="confetti"></div>
						<div class="confetti"></div>
						<div class="confetti"></div>
						<div class="confetti"></div>
						<div class="confetti"></div>
						<div class="confetti"></div>
						<div class="confetti"></div>
						<div class="confetti"></div>
					</div>
				</div>
			</div>
			<div class="foot">
				<div class="btn-group center">
					<a href="#" class="btn large primary js-pop-close">
						<span>확인</span>
					</a>
				</div>
				<ul class="com-txt4 dot-list">
					<li>로그인 후 수락하신 선물내역은 마이페이지 &gt; 선물함 &gt; 받은 선물에서 확인 할 수 있습니다.</li>
					<li>비로그인 수락 시 문자를 통해 배송조회 정보를 보내드립니다.</li>
				</ul>
			</div>
		</div>
	</div>
</article>
{%- endblock %}
