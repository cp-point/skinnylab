{% extends site + '/@inc/layout-empty.html' %}

{% block content -%}
<!-- 옵션클래스: full, full-scroll, hidden-title -->
<article id="popup-call-friend" class="common-popup bottom" data-motion-in="400" data-motion-out="200">
	<div class="common-popup-inner popup-call-friend">
		<div class="header">
			<h1 class="title">카카오톡 친구</h1>
			<button type="button" class="btn-close js-pop-close"><span>닫기</span></button>
		</div>
		<div class="container">
			<div class="body">
				<div class="form-layout vertical">
					<dl class="row">
						<dt class="hide">
							<label for="callName">실명 <span class="emphasis">*</span></label>
						</dt>
						<dd class="content">
							<span class="input-text-del">
								<input type="text" id="callName" name="callName" placeholder="실명을 정확히 입력해주세요." class="text block underline">
							</span>
						</dd>
					</dl>
				</div>
				<ul class="com-txt5 dot-list">
					<li>결제 완료 후 카카오톡 친구에게 선물을 전달할 수 있습니다.</li>
				</ul>
			</div>
			<div class="foot">
				<div class="btn-group center">
					<button class="btn large primary">
						<span>입력완료</span>
					</button>
				</div>
			</div>
		</div>
	</div>
</article>
{%- endblock %}
