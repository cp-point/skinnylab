	<script>
		$(function() {
			$('.option-dropdown').off('click').on('click', '.title button', function() {
				var $tg = $(this);
				var $tgTitle = $tg.parents('.title');
				var $tgContent = $tgTitle.next('.list');
				var isActive = $tgContent.is(':visible');
				
				if(isActive) {
					$tgContent.slideUp(200);
					$tg.parents('.option-dropdown').removeClass('on');
				} else {
					$tgContent.slideDown(200);
					$tg.parents('.option-dropdown').addClass('on');
				}
			});
		});
	</script>
