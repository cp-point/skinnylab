<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=1280">
	<title>스키니랩</title>
	
	
	<link rel="stylesheet" href="../../../js/lib/jquery-ui.css">
	<link rel="stylesheet" href="../../../js/lib/swiper.min.css">
	<link rel="stylesheet" href="../../../css/pc/common.css">
	<script src="../../../js/lib/jquery-3.4.1.min.js"></script>

<body>
	<!-- content // -->
	<!-- 옵션클래스: full, full-scroll, hidden-title -->
	<article id="popup-address-manage" class="common-popup" data-motion-in="400" data-motion-out="200">
		<div class="common-popup-inner popup-address-manage">
			<div class="header">
				<h1 class="title">배송지 관리</h1>
				<button type="button" class="btn-close js-pop-close"><span>닫기</span></button>
			</div>
			<div class="container">

					<div class="btn-group right">
						<button onclick="UI.showLayerPop('',{ url: './popup-address-register.html'}); return false;" class="btn outline thin primary">신규 배송지 등록</button>
					</div>
				</div>
				<div class="body">
					<ul class="address-list">
						<li class="item">
							<div class="btn-group between util-group">

									우리집
								</div>
								<div>
									<input type="radio" id="radioAddress1" name="radioAddress" class="select-address" checked>
									<label for="radioAddress1">선택</label>
								</div>
							</div>
							<dl class="info-member">
								<dt>홍길동</dt>
								<dd>010-1234-5678</dd>
							</dl>
							<div class="info-addr">
								(06569) 서울시 강남구 영동대로 511(트레이드 타워) 2104호 헬스밸런스 주소가 긴 경우 주소가 긴 경우
							</div>
						</li>
						<li class="item">
							<div class="btn-group between util-group">
								<div>회사</div>
								<div>
									<input type="radio" id="radioAddress2" name="radioAddress" class="select-address" checked>
									<label for="radioAddress2">선택</label>
								</div>
							</div>
							<dl class="info-member">
								<dt>홍길동</dt>
								<dd>010-1234-5678</dd>
							</dl>
							<div class="info-addr">
								(12345) 서울시 서초구 방배천로 118, 1F 에이디앤스타일
							</div>
						</li>
						<li class="item">
							<div class="btn-group between util-group">
								<div>회사</div>
								<div>
									<input type="radio" id="radioAddress3" name="radioAddress" class="select-address" checked>
									<label for="radioAddress3">선택</label>
								</div>
							</div>
							<dl class="info-member">
								<dt>부모님댁</dt>
								<dd>010-1234-5678</dd>
							</dl>
							<div class="info-addr">
								(22222) 서울시 종로구 땡땡땡로 땡땡길 123
							</div>
						</li>
						<li class="empty">
							<p class="desc">
								등록된 배송지가 없습니다.
							</p>
						</li>
					</ul>
					
					<div class="common-pagination">
						<a href="#" class="paging-btn prev">Prev</a>
						<span class="paging-num">
							<a href="#" class="on">1</a>
							<a href="#">2</a>
							<a href="#">3</a>
							<a href="#">4</a>
							<a href="#">5</a>
						</span>
						<a href="#" class="paging-btn next">Next</a>
					</div>
					
				</div>
			</div>
